<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<title>Libros Gratis</title>
	<link rel="stylesheet" href="public/stylesheets/error404.css">
</head>
<body>
  <h1>Recurso no encontrado</h1>
	<p>¿Quieres saber cuándo estará disponible?</p>
	<p>¡Suscríbete y te notificaremos!</p>	<main>
		<form action="." class="formulario">
			<label for="nombres">
				<span>Nombres:</span>
				<input type="text" name="nombres" id="nombres" placeholder="Ingresar nombres" class="formulario__campo">
			</label>
			<label for="apellidos">
				<span>Apellidos:</span>
				<input type="text" name="apellido" id="apellidos" placeholder="Ingresar apellidos" class="formulario__campo">
			</label>
			<label for="correo">
				<span>Correo electrónico:</span>
				<input type="email" name="correo" id="correo" placeholder="usuario@librosgratis.com" class="formulario__campo">
			</label>
			<input type="submit" id="formulario__enviar" value="¡Manténganme informando!">
		</form>
	</main>
</body>
</html>
